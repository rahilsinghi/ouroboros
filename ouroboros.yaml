# ouroboros.yaml — Ouroboros self-improvement engine configuration
# Self-targeting mode: Ouroboros improves its own code

target:
  path: ouroboros/
  cli_command: "python -m ouroboros"
  test_command: "python -m pytest tests/ouroboros/ -v"

models:
  observer: claude-sonnet-4-6
  strategist: claude-sonnet-4-6
  implementer: claude-sonnet-4-6
  evaluator: claude-sonnet-4-6

loop:
  max_iterations: 10
  time_budget_minutes: 180
  max_tokens_per_iteration: 100000
  cooldown_seconds: 30

sandbox:
  allowed_commands:
    - "python -m ouroboros"
    - "python -m pytest"
    - "mypy --strict ouroboros/"
    - "ruff check ouroboros/"
  blocked_paths:
    # Safety: never modify the core loop, safety, or git internals
    - "ouroboros/loop.py"
    - "ouroboros/sandbox/"
    - "ouroboros/agents/evaluator.py"
    - "ouroboros/scoreboard/runner.py"
    - "ouroboros/config.py"
    - ".git/"
    - "docs/"
    - "tests/"
    - "conftest.py"
    - ".ouroboros/prompts/meta.md"
    - ".ouroboros/benchmarks/"
    - ".ouroboros/archive/"
  timeout_seconds: 300

scoreboard:
  merge_gate:
    regression_rate: 1.0
    noise_tolerance: 0.005

meta:
  model: claude-opus-4-6
  tournament_tasks: 5
  rotating_task_refresh: 10
  prompt_bloat_limit: 1.2
  min_telemetry_records: 2

budget:
  max_usd_per_run: 10.00
  max_usd_per_iteration: 2.00
  warn_at_percentage: 80
